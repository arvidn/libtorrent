name: Python bindings

on:
   push:
      branches: [ RC_1_2 RC_2_0 master ]
   pull_request:

concurrency:
   group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
   cancel-in-progress: true

env:
   HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
   HOMEBREW_NO_AUTO_UPDATE: 1

jobs:

  test:
    name: build
    runs-on: ${{ matrix.os }}

    strategy:
      # on linux and mac, the boost libraries are fixed to a python version.
      # since we install boost from repos on those systems, we must use the
      # matching python versions
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.12"
          - os: ubuntu-24.04-arm
            python-version: "3.12"
          - os: macos-14
            python-version: "3.14"
          - os: windows-2022
            python-version: 3.9

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 1
        filter: tree:0

    # Note:
    #  - on mac and linux images, 'python' is python2 and 'python3' is
    #    python3
    #  - on windows, neither 'python' nor 'python3' is in PATH by default
    #  - setup-python sets up PATH so 'python' and 'python3' point to the
    #    requested version on mac and linux, but on windows it only sets up
    #    'python'.
    - uses: actions/setup-python@v2
      with:
         python-version: ${{ matrix.python-version }}

    - name: install tox
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade tox

    - name: dependencies (MacOS)
      if: runner.os == 'macOS'
      run: |
        brew install boost-build boost boost-python3 python@3.14 openssl@3 python-setuptools
        export PATH=$(brew --prefix)/opt/python@3.14/bin:$PATH

    - name: update package lists (linux)
      if: runner.os == 'Linux'
      continue-on-error: true
      run: |
        sudo apt update

    - uses: Chocobo1/setup-ccache-action@v1
      if: runner.os != 'Windows'
      with:
        update_packager_index: false
        override_cache_key: ccache-python-${{ matrix.os }}-${{ github.base_ref }}
        ccache_options: |
          max_size=500M

    - name: dependencies (linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt install libboost-tools-dev libboost-python-dev libboost-dev libboost-system-dev python3 python3-setuptools libssl-dev

    - name: dependencies (windows)
      if: runner.os == 'Windows'
      run: |
        python -m pip install --upgrade setuptools

    - name: install openssl:x64-windows-static (windows)
      if: runner.os == 'Windows'
      uses: ./.github/actions/win_install_openssl
      with:
        architecture: x64
        linking: static

    - name: install boost (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        git clone --depth=1 --recurse-submodules -j10 --branch=boost-1.91.0 https://github.com/boostorg/boost.git
        cd boost
        bootstrap.bat

    - name: boost headers (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        cd boost
        .\b2 headers

    - name: build/test with tox (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        set BOOST_ROOT=%CD%\boost
        set PATH=%BOOST_ROOT%;%PATH%
        set PYTHON_INTERPRETER=python
        tox -e py

    - name: build no-deprecated (Linux)
      if: runner.os == 'Linux'
      run: |
        cd bindings/python
        python3 -m pip install setuptools
        python3 setup.py build_ext --b2-args "deprecated-functions=off"

    - name: enable core dumps (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt install -y gdb
        # the default core_pattern on the GitHub runners pipes to apport,
        # which swallows the dump. point it at a plain file in cwd instead.
        echo 'core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern

    - name: tests (Linux)
      if: runner.os == 'Linux'
      run: |
        # Exporting SYSTEM_VERSION_COMPAT=0 helps pip allow install macos 11 tagged wheels. Ref https://github.com/pypa/packaging/issues/497
        export SYSTEM_VERSION_COMPAT=0
        # raise RLIMIT_CORE so segfaults produce a core file we can debug
        ulimit -c unlimited
        # block pytest's faulthandler plugin. otherwise faulthandler catches
        # the original SIGSEGV, dumps a python traceback and chains via
        # raise(), and the resulting core has only __pthread_kill at the
        # top instead of the real crash site.
        export PYTEST_EXTRA="-p no:faulthandler"
        tox -e py

    - name: backtrace from core dumps (Linux)
      if: failure() && runner.os == 'Linux'
      run: |
        cores=$(find bindings/python -maxdepth 4 -name 'core.*' -type f 2>/dev/null)
        if [ -z "$cores" ]; then
          echo "No core files found under bindings/python"
          exit 0
        fi
        for core in $cores; do
          echo "=================================================================="
          echo "=== $core"
          echo "=================================================================="
          # the executable that wrote the core is recorded in the file name
          # (core.<exe>.<pid>); recover it via 'file' so gdb can resolve symbols.
          exe=$(file "$core" | sed -n "s/.*execfn: '\([^']*\)'.*/\1/p")
          if [ -z "$exe" ]; then exe=$(command -v python3); fi
          echo "executable: $exe"
          # -iex 'set auto-load python-scripts off' disables gdb's auto-loaded
          # Python frame filters; one of them throws ModuleNotFoundError on
          # the runner image and aborts 'bt' after frame 0.
          # 'bt full no-filters' bypasses any remaining filters.
          gdb --batch \
              -iex 'set auto-load python-scripts off' \
              -iex 'set print frame-arguments none' \
              -ex 'set pagination off' \
              -ex 'set debuginfod enabled on' \
              -ex 'thread apply all bt full no-filters' \
              "$exe" "$core" 2>&1 || true
        done

    - name: upload core dumps (Linux)
      if: failure() && runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: core-dumps-${{ matrix.os }}
        path: |
          bindings/python/**/core.*
          bindings/python/build/**/libtorrent*.so
          bindings/python/.tox/py/lib/**/libtorrent*.so
        if-no-files-found: ignore

    - name: tests (MacOS)
      if: runner.os == 'macOS'
      run: |
        # Exporting SYSTEM_VERSION_COMPAT=0 helps pip allow install macos 11 tagged wheels. Ref https://github.com/pypa/packaging/issues/497
        export SYSTEM_VERSION_COMPAT=0
        export PYTHON_INTERPRETER=$(brew --prefix)/opt/python@3.14/bin/python3
        tox -e py
