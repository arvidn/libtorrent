name: C bindings

on:
   push:
      branches: [ RC_2_1, master ]
      paths-ignore:
         - bindings/python/**
   pull_request:
      paths-ignore:
         - bindings/python/**

concurrency:
   group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
   cancel-in-progress: true

env:
   HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
   HOMEBREW_NO_AUTO_UPDATE: 1

jobs:

  test:
    name: build
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-2022 ]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: dependencies (MacOS)
      if: runner.os == 'macOS'
      run: |
        brew install boost-build boost
        echo "using darwin ;" >>~/user-config.jam

    - name: update package lists (linux)
      if: runner.os == 'Linux'
      continue-on-error: true
      run: |
        sudo apt update

    - name: dependencies (linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt install libboost-tools-dev libboost-dev libboost-system-dev

    - name: install openssl (windows)
      if: runner.os == 'Windows'
      uses: ./.github/actions/win_install_openssl
      with:
        architecture: x64
        linking: static

    - name: setup msbuild (windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v2

    - name: install boost (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        git clone --depth=1 --recurse-submodules -j10 --branch=boost-1.78.0 https://github.com/boostorg/boost.git
        cd boost
        bootstrap.bat

    - name: boost headers (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        cd boost
        .\b2 headers

    - name: build (windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        set BOOST_ROOT=%CD%\boost
        set BOOST_BUILD_PATH=%BOOST_ROOT%\tools\build
        set PATH=%BOOST_ROOT%;%PATH%

        cd bindings\c
        b2 address-model=64 release openssl-include="C:\Program Files\OpenSSL\include" openssl-lib="C:\Program Files\OpenSSL\lib"

    - name: build
      if: runner.os != 'Windows'
      run: |
        cd bindings/c
        b2
